<header class="usuario-list-header">
    <h1>Usuarios</h1>
    <p class="usuario-list-count">{{ usuariosArray().length }} usuarios</p>
</header>

@if (selected()) {
    <app-usuario-detail [usuarioDetail]="selectedUser()" (close)="onCloseDetail()"></app-usuario-detail>
}

<div class="usuario-list">
    <article class="usuario-item" *ngFor="let usuario of usuariosArray()">
        <img class="usuario-avatar" [src]="usuario.avatarUrl" alt="Avatar de {{ usuario.username }}" (click)="onSelected(usuario)" />
        <h3 class="usuario-name">{{ usuario.username }}</h3>
    </article>
</div>
