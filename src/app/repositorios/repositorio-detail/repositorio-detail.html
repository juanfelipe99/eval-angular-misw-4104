@if (repositorioDetail(); as repositorio) {
    <section class="repositorio-detail">
        <button class="repositorio-detail-close" type="button" (click)="onClose()" aria-label="Cerrar detalle">×</button>
        <div class="repositorio-detail-top">
            <h2 class="repositorio-detail-name">{{ repositorio.name }}</h2>
            <span class="repositorio-detail-language"><strong>Lenguaje:</strong> {{ repositorio.language }}</span>
            <span class="repositorio-detail-stars"><strong>Estrellas:</strong> {{ repositorio.stars }}</span>
            <span class="repositorio-detail-createdAt"><strong>Creado:</strong> {{ repositorio.createdAt }}</span>
            <span class="repositorio-detail-ownerId"><strong>ID del Propietario:</strong> {{ repositorio.ownerId }}</span>
        </div>
        <p class="repositorio-detail-description"><strong>Descripción:</strong> {{ repositorio.description }}</p>
    </section>
}
